<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medium 블로그 분석 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --surface2: #F3F0EA;
    --border: #E8E4DC;
    --text: #2C2C2C;
    --text-muted: #6B6B6B;
    --accent: #8B6914;
    --accent-dim: rgba(139,105,20,0.08);
    --tag-bg: #EBF5FF;
    --tag-text: #2B6CB0;
    --cat-bg: #E8F5ED;
    --cat-text: #2D8A4E;
    --orange: #C4883A;
    --pink: #D4577A;
    --cyan: #2D9D8F;
    --purple: #7C5CBF;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  .header {
    padding: 48px 0 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: #FFFFFF;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    color: var(--accent);
  }
  .header p {
    color: var(--text-muted);
    font-size: 14px;
  }
  .stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 20px;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Layout — full width */
  .container {
    margin: 0;
    padding: 28px 32px;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 28px;
  }

  /* Sidebar */
  .sidebar { display: flex; flex-direction: column; gap: 24px; }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Search */
  .search-box {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-muted); }

  /* Categories */
  .cat-list { display: flex; flex-direction: column; gap: 4px; }
  .cat-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 14px;
  }
  .cat-item:hover, .cat-item.active { background: var(--accent-dim); }
  .cat-item.active { color: var(--accent); font-weight: 600; }
  .cat-count {
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  /* Tag Cloud */
  .tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    display: inline-block;
    padding: 4px 12px;
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .tag:hover, .tag.active {
    border-color: var(--tag-text);
    background: rgba(43,108,176,0.12);
  }
  .tag .tag-count {
    margin-left: 4px;
    opacity: 0.6;
  }
  /* Tag sizes */
  .tag.size-lg { font-size: 15px; padding: 6px 14px; font-weight: 600; }
  .tag.size-md { font-size: 13px; padding: 5px 13px; }
  .tag.size-sm { font-size: 12px; }

  /* Word Cloud */
  .word-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    justify-content: center;
    padding: 8px 0;
  }
  .word {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    opacity: 0.8;
  }
  .word:hover { opacity: 1; transform: scale(1.1); }

  /* Main Content */
  .main { display: flex; flex-direction: column; gap: 16px; }
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .results-count {
    font-size: 14px;
    color: var(--text-muted);
  }
  .active-filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
  }
  .filter-badge:hover { text-decoration: line-through; }

  /* Article Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    transition: border-color 0.2s, transform 0.15s;
    cursor: default;
  }
  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 12px;
  }
  .card-num {
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    flex: 1;
  }
  .card-title a {
    color: var(--text);
    text-decoration: none;
  }
  .card-title a:hover { color: var(--accent); }
  .card-meta {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .card-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .card-tag {
    padding: 3px 10px;
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 16px;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .card-tag:hover { background: rgba(43,108,176,0.12); }
  .card-cat {
    padding: 3px 10px;
    background: var(--cat-bg);
    color: var(--cat-text);
    border-radius: 16px;
    font-size: 11px;
  }
  .card-links {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .card-link {
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-link:hover { text-decoration: underline; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* Viewer Overlay */
  .viewer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(6px);
    justify-content: center;
    align-items: flex-start;
    padding: 32px 16px;
    overflow-y: auto;
  }
  .viewer-overlay.open { display: flex; }
  .viewer-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 860px;
    width: 100%;
    padding: 40px 48px;
    position: relative;
    margin: 0 auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.15);
  }
  .viewer-close {
    position: sticky;
    top: 0;
    float: right;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 36px;
    height: 36px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: all 0.15s;
  }
  .viewer-close:hover { background: var(--border); color: var(--text); }
  .viewer-loading {
    text-align: center;
    padding: 60px 0;
    color: var(--text-muted);
  }
  .viewer-loading .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Markdown rendered content */
  .md-content h1 { font-size: 26px; font-weight: 700; margin: 0 0 8px; line-height: 1.3; color: var(--text); }
  .md-content h2 { font-size: 20px; font-weight: 700; margin: 36px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
  .md-content h3 { font-size: 17px; font-weight: 600; margin: 28px 0 12px; color: var(--text); }
  .md-content h4 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; color: var(--text-muted); }
  .md-content p { margin: 12px 0; font-size: 15px; line-height: 1.8; color: var(--text); }
  .md-content blockquote {
    margin: 16px 0;
    padding: 12px 20px;
    border-left: 3px solid var(--accent);
    background: var(--accent-dim);
    border-radius: 0 8px 8px 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .md-content blockquote p { margin: 4px 0; }
  .md-content ul, .md-content ol { margin: 12px 0; padding-left: 24px; }
  .md-content li { margin: 6px 0; font-size: 15px; line-height: 1.7; }
  .md-content strong { color: var(--text); font-weight: 600; }
  .md-content code {
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--tag-text);
  }
  .md-content pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    margin: 16px 0;
  }
  .md-content pre code {
    background: none;
    padding: 0;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
  }
  .md-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 14px;
  }
  .md-content th {
    background: var(--surface2);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    border-bottom: 2px solid var(--border);
    color: var(--text);
    white-space: nowrap;
  }
  .md-content td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    line-height: 1.6;
    vertical-align: top;
  }
  .md-content tr:hover td { background: rgba(139,105,20,0.04); }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  .md-content a { color: var(--accent); text-decoration: none; }
  .md-content a:hover { text-decoration: underline; }
  .md-content em { color: var(--text-muted); }

  /* Responsive */
  @media (max-width: 768px) {
    .container {
      grid-template-columns: 1fr;
      padding: 20px 16px;
    }
    .header { padding: 32px 16px 24px; }
    .header h1 { font-size: 22px; }
    .stats { gap: 24px; }
  }
</style>

// ==================== MARKDOWN PARSER ====================
function parseMd(md) {
  // Tables
  md = md.replace(/^(\|.+\|)\n(\|[\s:|-]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, body) => {
    const ths = header.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(r => {
      const tds = r.split('|').filter(c=>c.trim()).map(c=>`<td>${inlineMd(c.trim())}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });
  const lines = md.split('\n');
  let html = '', inCode = false, codeLang = '', codeBlock = '', inList = false, listType = '';
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.startsWith('```')) {
      if (!inCode) { inCode = true; codeLang = line.slice(3).trim(); codeBlock = ''; }
      else { html += `<pre><code>${esc(codeBlock)}</code></pre>`; inCode = false; }
      continue;
    }
    if (inCode) { codeBlock += (codeBlock?'\n':'') + line; continue; }
    if (inList && !/^\s*[-*]\s/.test(line) && !/^\s*\d+\.\s/.test(line) && line.trim() !== '') {
      html += `</${listType}>`; inList = false;
    }
    if (/^#{1,4}\s/.test(line)) {
      const lvl = line.match(/^#+/)[0].length;
      html += `<h${lvl}>${inlineMd(line.replace(/^#+\s/,''))}</h${lvl}>`;
    } else if (/^>\s/.test(line)) {
      let bq = line.replace(/^>\s?/,'');
      while (i+1<lines.length && /^>\s?/.test(lines[i+1])) { i++; bq += '\n'+lines[i].replace(/^>\s?/,''); }
      html += `<blockquote>${bq.split('\n').map(l=>`<p>${inlineMd(l)}</p>`).join('')}</blockquote>`;
    } else if (/^\s*[-*]\s/.test(line)) {
      if (!inList || listType!=='ul') { if(inList) html+=`</${listType}>`; html+='<ul>'; inList=true; listType='ul'; }
      html += `<li>${inlineMd(line.replace(/^\s*[-*]\s/,''))}</li>`;
    } else if (/^\s*\d+\.\s/.test(line)) {
      if (!inList || listType!=='ol') { if(inList) html+=`</${listType}>`; html+='<ol>'; inList=true; listType='ol'; }
      html += `<li>${inlineMd(line.replace(/^\s*\d+\.\s/,''))}</li>`;
    } else if (/^---\s*$/.test(line)) {
      html += '<hr>';
    } else if (line.trim() === '') {
      // skip empty
    } else {
      html += `<p>${inlineMd(line)}</p>`;
    }
  }
  if (inList) html += `</${listType}>`;
  if (inCode) html += `<pre><code>${esc(codeBlock)}</code></pre>`;
  return html;
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inlineMd(s) {
  return s
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
}

// ==================== STATE ====================
let activeCategory = null;
let activeTags = new Set();
let searchQuery = "";

// ==================== RENDER ====================
function getAllCategories() {
  const map = {};
  articles.forEach(a => { map[a.category] = (map[a.category] || 0) + 1; });
  return Object.entries(map).sort((a, b) => b[1] - a[1]);
}

function getAllTags() {
  const map = {};
  articles.forEach(a => a.tags.forEach(t => { map[t] = (map[t] || 0) + 1; }));
  return Object.entries(map).sort((a, b) => b[1] - a[1]);
}

function getAllKeywords() {
  const map = {};
  articles.forEach(a => (a.keywords || []).forEach(k => { map[k] = (map[k] || 0) + 1; }));
  return Object.entries(map).sort((a, b) => b[1] - a[1]);
}

function getFiltered() {
  return articles.filter(a => {
    if (activeCategory && a.category !== activeCategory) return false;
    if (activeTags.size > 0 && ![...activeTags].some(t => a.tags.includes(t))) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = [a.title, a.description, a.category, ...a.tags, ...(a.keywords||[]), a.author].join(" ").toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

const colors = ["#4A7BF7","#D4577A","#2D9D8F","#C4883A","#7C5CBF","#B45309","#0E7490","#BE185D","#4D7C0F","#DC2626"];

function renderStats() {
  document.getElementById("totalDocs").textContent = articles.length;
  document.getElementById("totalCats").textContent = getAllCategories().length;
  document.getElementById("totalTags").textContent = getAllTags().length;
}

function renderCategories() {
  const cats = getAllCategories();
  const el = document.getElementById("catList");
  el.innerHTML = `<div class="cat-item ${!activeCategory ? 'active' : ''}" onclick="setCategory(null)">
      <span>전체</span><span class="cat-count">${articles.length}</span>
    </div>` +
    cats.map(([cat, count]) => `
      <div class="cat-item ${activeCategory === cat ? 'active' : ''}" onclick="setCategory('${cat}')">
        <span>${cat}</span><span class="cat-count">${count}</span>
      </div>`).join("");
}

function renderTagCloud() {
  const tags = getAllTags();
  const max = Math.max(...tags.map(t => t[1]));
  const el = document.getElementById("tagCloud");
  el.innerHTML = tags.map(([tag, count]) => {
    const size = count === max ? "size-lg" : count >= max * 0.6 ? "size-md" : "size-sm";
    const isActive = activeTags.has(tag);
    return `<span class="tag ${size} ${isActive ? 'active' : ''}" onclick="toggleTag('${tag}')">#${tag}<span class="tag-count">${count}</span></span>`;
  }).join("");
}

function renderWordCloud() {
  const words = getAllKeywords();
  if (words.length === 0) return;
  const max = Math.max(...words.map(w => w[1]));
  const el = document.getElementById("wordCloud");
  // Shuffle for visual variety
  const shuffled = [...words].sort(() => Math.random() - 0.5);
  el.innerHTML = shuffled.map(([word, count]) => {
    const ratio = count / max;
    const fontSize = 11 + ratio * 14;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const opacity = 0.5 + ratio * 0.5;
    return `<span class="word" style="font-size:${fontSize}px;color:${color};opacity:${opacity}" onclick="searchFor('${word}')">${word}</span>`;
  }).join("");
}

function renderArticles() {
  const filtered = getFiltered();
  const el = document.getElementById("articleList");
  document.getElementById("resultsCount").textContent = `${filtered.length}건의 문서`;

  // Active filters
  const filtersEl = document.getElementById("activeFilters");
  let filterHtml = "";
  if (activeCategory) filterHtml += `<span class="filter-badge" onclick="setCategory(null)">${activeCategory} ✕</span>`;
  activeTags.forEach(t => { filterHtml += `<span class="filter-badge" onclick="toggleTag('${t}')">#${t} ✕</span>`; });
  if (searchQuery) filterHtml += `<span class="filter-badge" onclick="clearSearch()">"${searchQuery}" ✕</span>`;
  filtersEl.innerHTML = filterHtml;

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">&#x1F50D;</div><p>검색 결과가 없습니다</p></div>`;
    return;
  }

  el.innerHTML = filtered.map(a => `
    <div class="card">
      <div class="card-header">
        <div class="card-num">${a.id}</div>
        <div class="card-title"><a href="#" onclick="openReport('${a.path}');return false;">${a.title}</a></div>
      </div>
      <div class="card-meta">
        <span>&#x1F4DD; ${a.author}</span>
        <span>&#x1F4C5; ${a.date}</span>
        <span class="card-cat">&#x1F4C2; ${a.category}</span>
      </div>
      <div class="card-desc">${a.description}</div>
      <div class="card-tags">
        ${a.tags.map(t => `<span class="card-tag" onclick="toggleTag('${t}')">#${t}</span>`).join("")}
      </div>
      <div class="card-links">
        <a class="card-link" href="#" onclick="openReport('${a.path}');return false;">&#x1F4C4; 보고서 보기</a>
        <a class="card-link" href="${a.originalUrl}" target="_blank">&#x1F517; 원문 보기</a>
      </div>
    </div>`).join("");
}

function renderAll() {
  renderStats();
  renderCategories();
  renderTagCloud();
  renderWordCloud();
  renderArticles();
}

// ==================== ACTIONS ====================
function setCategory(cat) {
  activeCategory = cat;
  renderAll();
}

function toggleTag(tag) {
  if (activeTags.has(tag)) activeTags.delete(tag);
  else activeTags.add(tag);
  renderAll();
}

function searchFor(word) {
  document.getElementById("searchInput").value = word;
  searchQuery = word;
  renderAll();
}

function clearSearch() {
  document.getElementById("searchInput").value = "";
  searchQuery = "";
  renderAll();
}

// ==================== VIEWER ====================
function openReport(path) {
  // HTML 파일은 새 탭으로 열기 (마크다운 파서 대신)
  if (path.endsWith('.html')) {
    window.open(path, '_blank');
    return;
  }
  const overlay = document.getElementById("viewerOverlay");
  const content = document.getElementById("viewerContent");
  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
  content.innerHTML = '<div class="viewer-loading"><div class="spinner"></div><p>로딩 중...</p></div>';
  fetch(path)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(md => { content.innerHTML = parseMd(md); })
    .catch(() => { content.innerHTML = '<div class="viewer-loading"><p>파일을 불러올 수 없습니다.<br>로컬 서버에서 열어주세요: <code>python3 -m http.server 8080</code></p></div>'; });
}

function closeViewer() {
  document.getElementById("viewerOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeViewer();
});

// ==================== INIT ====================
document.getElementById("searchInput").addEventListener("input", (e) => {
  searchQuery = e.target.value.trim();
  renderArticles();
});

renderAll();
</script>
